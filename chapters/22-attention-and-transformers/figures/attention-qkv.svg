<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="560" rx="12" fill="#f6f8fa"/>
  <text x="60" y="46" font-size="20" font-weight="700" fill="#24292f">Attention: every position asks a question; the best-matching positions answer</text>

  <!-- Library analogy strip -->
  <g font-size="14">
    <rect x="60" y="72" width="840" height="66" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="80" y="99" fill="#3730a3" font-weight="700">The analogy:</text>
    <text x="196" y="99" fill="#3730a3">a QUERY is the question you bring to the library; each book's spine label is its KEY;</text>
    <text x="196" y="122" fill="#3730a3">its content is its VALUE. You read most from the books whose labels best match your question.</text>
  </g>

  <!-- Pipeline -->
  <defs>
    <marker id="qArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#57606a"/>
    </marker>
  </defs>

  <g font-size="15">
    <!-- Step boxes -->
    <rect x="60" y="190" width="185" height="96" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="76" y="220" font-weight="700" fill="#1e3a8a">1. match scores</text>
    <text x="76" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1e3a8a">Q K&#7488; / &#8730;d</text>
    <text x="76" y="270" font-size="12" fill="#57606a">every query &#183; every key</text>

    <rect x="290" y="190" width="185" height="96" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="306" y="220" font-weight="700" fill="#7f1d1d">2. causal mask</text>
    <text x="306" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#7f1d1d">future &#8594; -&#8734;</text>
    <text x="306" y="270" font-size="12" fill="#57606a">no peeking ahead (LMs only)</text>

    <rect x="520" y="190" width="185" height="96" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="536" y="220" font-weight="700" fill="#14532d">3. softmax rows</text>
    <text x="536" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#14532d">weights sum to 1</text>
    <text x="536" y="270" font-size="12" fill="#57606a">"how much to read from each"</text>

    <rect x="750" y="190" width="150" height="96" rx="10" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <text x="766" y="220" font-weight="700" fill="#78350f">4. blend</text>
    <text x="766" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#78350f">weights V</text>
    <text x="766" y="270" font-size="12" fill="#57606a">weighted avg of values</text>

    <line x1="245" y1="238" x2="282" y2="238" stroke="#57606a" stroke-width="2.5" marker-end="url(#qArrow)"/>
    <line x1="475" y1="238" x2="512" y2="238" stroke="#57606a" stroke-width="2.5" marker-end="url(#qArrow)"/>
    <line x1="705" y1="238" x2="742" y2="238" stroke="#57606a" stroke-width="2.5" marker-end="url(#qArrow)"/>
  </g>

  <!-- Worked numbers strip -->
  <text x="60" y="340" font-size="15" font-weight="700" fill="#24292f">the worked example's middle row (query 2 = (0,1)):</text>
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#24292f">
    <text x="60" y="372">scores vs the 3 keys:   0.000   0.707   0.000</text>
    <text x="60" y="398">softmax:                0.248   0.503   0.248</text>
    <text x="60" y="424">output = 0.248*(1,0) + 0.503*(10,0) + 0.248*(0,10) = (5.283, 2.483)</text>
  </g>

  <text x="60" y="478" font-size="15" fill="#24292f">Where Q, K, V come from: three learned matrices multiply each token's embedding. The model LEARNS what</text>
  <text x="60" y="500" font-size="15" fill="#24292f">questions to ask (W_q), what to advertise (W_k), and what to hand over (W_v) &#8212; backprop trains all three.</text>
  <text x="60" y="534" font-size="14" fill="#57606a">Multi-head = several of these in parallel with separate learned matrices, each free to track a different relationship.</text>
</svg>
