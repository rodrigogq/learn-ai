<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"><rect x="0" y="0" width="960" height="520" rx="12" fill="#f6f8fa"/>
<defs>
<marker id="mUp" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0 0, 9 4, 0 8" fill="#dc2626"/></marker>
<marker id="mDown" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0 0, 9 4, 0 8" fill="#16a34a"/></marker>
<marker id="mComp" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 8 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="mGrad" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto"><polygon points="0 0, 10 4.5, 0 9" fill="#9333ea"/></marker>
</defs>
<text x="60" y="46" font-size="20" fill="#24292f" font-weight="700" text-anchor="start" font-style="normal">The gradient: stack the two partials into one arrow &#8212; and it points straight uphill</text>
<text x="60" y="72" font-size="15" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">Bird's-eye view of the same bowl. Rings are height lines (contours); the arrow lives at the point (2, 1).</text>
<ellipse cx="360" cy="300" rx="201.6" ry="116.4" fill="none" stroke="#bfdbfe" stroke-width="2"/>
<ellipse cx="360" cy="300" rx="164.6" ry="95.1" fill="none" stroke="#93c5fd" stroke-width="2"/>
<ellipse cx="360" cy="300" rx="132.0" ry="76.2" fill="none" stroke="#60a5fa" stroke-width="2"/>
<ellipse cx="360" cy="300" rx="116.4" ry="67.2" fill="none" stroke="#3b82f6" stroke-width="3"/>
<ellipse cx="360" cy="300" rx="76.2" ry="44.0" fill="none" stroke="#2563eb" stroke-width="2"/>
<circle cx="360" cy="300" r="5" fill="#1e3a8a"/>
<text x="346" y="304" font-size="12" fill="#1e3a8a" font-weight="700" text-anchor="end" font-style="normal">min (0,0)</text>
<circle cx="448.0" cy="256.0" r="6" fill="#111827"/>
<text x="439" y="247" font-size="13" fill="#111827" font-weight="700" text-anchor="end" font-style="normal">(2, 1)</text>
<line x1="448.0" y1="256.0" x2="504.0" y2="256.0" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#mComp)"/>
<text x="476.0" y="274" font-size="13" fill="#1e3a8a" font-weight="700" text-anchor="middle" font-style="normal">&#8706;f/&#8706;x = 4</text>
<line x1="504.0" y1="256.0" x2="504.0" y2="172.0" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#mComp)"/>
<text x="512" y="214.0" font-size="13" fill="#1e3a8a" font-weight="700" text-anchor="start" font-style="normal">&#8706;f/&#8706;y = 6</text>
<line x1="448.0" y1="256.0" x2="504.0" y2="172.0" stroke="#9333ea" stroke-width="4" marker-end="url(#mGrad)"/>
<text x="512" y="168" font-size="15" fill="#6b21a8" font-weight="700" text-anchor="start" font-style="normal">&#8711;f = (4, 6)</text>
<line x1="448.0" y1="256.0" x2="392.0" y2="340.0" stroke="#16a34a" stroke-width="4" marker-end="url(#mDown)"/>
<text x="384" y="344" font-size="15" fill="#14532d" font-weight="700" text-anchor="end" font-style="normal">&#8722;&#8711;f</text>
<rect x="620" y="120" width="320" height="180" rx="10" fill="#ffffff" stroke="#d0d7de"/>
<text x="640" y="148" font-size="15" fill="#24292f" font-weight="700" text-anchor="start" font-style="normal">the arrow, decoded:</text>
<line x1="640.0" y1="176.0" x2="676.0" y2="176.0" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="5 4"/>
<text x="686" y="181" font-size="13.5" fill="#1e3a8a" font-weight="normal" text-anchor="start" font-style="normal">the two partials (4 and 6) are its</text>
<text x="686" y="200" font-size="13.5" fill="#1e3a8a" font-weight="normal" text-anchor="start" font-style="normal">horizontal and vertical parts</text>
<line x1="640.0" y1="226.0" x2="676.0" y2="226.0" stroke="#9333ea" stroke-width="4"/>
<text x="686" y="231" font-size="13.5" fill="#6b21a8" font-weight="700" text-anchor="start" font-style="normal">&#8711;f: the gradient = steepest UPHILL</text>
<line x1="640.0" y1="262.0" x2="676.0" y2="262.0" stroke="#16a34a" stroke-width="4"/>
<text x="686" y="259" font-size="13.5" fill="#14532d" font-weight="700" text-anchor="start" font-style="normal">&#8722;&#8711;f: steepest DOWNHILL &#8212;</text>
<text x="686" y="278" font-size="13.5" fill="#14532d" font-weight="normal" text-anchor="start" font-style="normal">the direction training steps</text>
<text x="60" y="452" font-size="14.5" fill="#24292f" font-weight="normal" text-anchor="start" font-style="normal">The gradient points perpendicular to the contour ring &#8212; the single fastest way UP. Step the opposite way (&#8722;&#8711;f) to go DOWN.</text>
<text x="60" y="480" font-size="13" fill="#57606a" font-weight="normal" text-anchor="start" font-style="italic">(On an oval bowl the downhill arrow does not aim exactly at the minimum, so the descent path curves &#8212; that is the next section.)</text>
</svg>