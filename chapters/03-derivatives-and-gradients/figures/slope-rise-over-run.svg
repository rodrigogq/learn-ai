<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="960" height="480" rx="12" fill="#f6f8fa"/>
<text x="60.0" y="46.0" font-size="20" fill="#24292f" font-weight="700" text-anchor="start">Slope = rise over run: how much you climb for every step you take forward</text>
<text x="60.0" y="72.0" font-size="15" fill="#57606a" font-weight="normal" text-anchor="start">Imagine walking. The slope is the height you gain (or lose) for each 1 step forward &#8212; nothing more.</text>
<rect x="40" y="96" width="290" height="350" rx="10" fill="#ffffff" stroke="#d0d7de"/>
<line x1="72.0" y1="400.0" x2="310.0" y2="400.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="80.0" y1="408.0" x2="80.0" y2="165.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="98.0" y1="372.8" x2="224.0" y2="182.4" stroke="#2563eb" stroke-width="4"/>
<line x1="143.0" y1="304.8" x2="188.0" y2="304.8" stroke="#d97706" stroke-width="3"/>
<line x1="188.0" y1="304.8" x2="188.0" y2="236.8" stroke="#16a34a" stroke-width="3"/>
<text x="165.5" y="322.8" font-size="13" fill="#78350f" font-weight="700" text-anchor="middle">forward 1</text>
<text x="196.0" y="274.8" font-size="13" fill="#14532d" font-weight="700" text-anchor="start">up 2</text>
<circle cx="120.5" cy="306.8" r="5.5" fill="#111827"/><line x1="120.5" y1="311.8" x2="120.5" y2="325.8" stroke="#111827" stroke-width="2.5"/><line x1="120.5" y1="325.8" x2="114.5" y2="338.8" stroke="#111827" stroke-width="2.5"/><line x1="120.5" y1="325.8" x2="126.5" y2="338.8" stroke="#111827" stroke-width="2.5"/><line x1="120.5" y1="315.8" x2="128.5" y2="321.8" stroke="#111827" stroke-width="2.5"/>
<text x="80.0" y="128.0" font-size="16" fill="#2563eb" font-weight="700" text-anchor="start">walking UPHILL</text>
<text x="80.0" y="150.0" font-size="13" fill="#57606a" font-weight="normal" text-anchor="start">for every 1 forward, you climb 2</text>
<text x="80.0" y="428.0" font-size="15" fill="#24292f" font-weight="700" text-anchor="start" font-family="ui-monospace, Menlo, monospace">slope = +2/1 = +2</text>
<rect x="350" y="96" width="290" height="350" rx="10" fill="#ffffff" stroke="#d0d7de"/>
<line x1="382.0" y1="400.0" x2="620.0" y2="400.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="390.0" y1="408.0" x2="390.0" y2="165.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="388.0" y1="189.2" x2="518.5" y2="386.4" stroke="#dc2626" stroke-width="4"/>
<line x1="433.0" y1="257.2" x2="478.0" y2="257.2" stroke="#d97706" stroke-width="3"/>
<line x1="478.0" y1="257.2" x2="478.0" y2="325.2" stroke="#16a34a" stroke-width="3"/>
<text x="455.5" y="275.2" font-size="13" fill="#78350f" font-weight="700" text-anchor="middle">forward 1</text>
<text x="486.0" y="295.2" font-size="13" fill="#14532d" font-weight="700" text-anchor="start">down 2</text>
<circle cx="410.5" cy="191.2" r="5.5" fill="#111827"/><line x1="410.5" y1="196.2" x2="410.5" y2="210.2" stroke="#111827" stroke-width="2.5"/><line x1="410.5" y1="210.2" x2="404.5" y2="223.2" stroke="#111827" stroke-width="2.5"/><line x1="410.5" y1="210.2" x2="416.5" y2="223.2" stroke="#111827" stroke-width="2.5"/><line x1="410.5" y1="200.2" x2="418.5" y2="206.2" stroke="#111827" stroke-width="2.5"/>
<text x="390.0" y="128.0" font-size="16" fill="#dc2626" font-weight="700" text-anchor="start">walking DOWNHILL</text>
<text x="390.0" y="150.0" font-size="13" fill="#57606a" font-weight="normal" text-anchor="start">for every 1 forward, you drop 2</text>
<text x="390.0" y="428.0" font-size="15" fill="#24292f" font-weight="700" text-anchor="start" font-family="ui-monospace, Menlo, monospace">slope = &#8722;2/1 = &#8722;2</text>
<rect x="660" y="96" width="290" height="350" rx="10" fill="#ffffff" stroke="#d0d7de"/>
<line x1="692.0" y1="400.0" x2="930.0" y2="400.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="700.0" y1="408.0" x2="700.0" y2="165.0" stroke="#9ca3af" stroke-width="2"/>
<line x1="688.0" y1="298.0" x2="818.5" y2="298.0" stroke="#6b7280" stroke-width="4"/>
<line x1="733.0" y1="298.0" x2="778.0" y2="298.0" stroke="#d97706" stroke-width="3"/>
<text x="755.5" y="316.0" font-size="13" fill="#78350f" font-weight="700" text-anchor="middle">forward 1</text>
<text x="788.0" y="290.0" font-size="13" fill="#14532d" font-weight="700" text-anchor="start">up 0</text>
<circle cx="710.5" cy="266.0" r="5.5" fill="#111827"/><line x1="710.5" y1="271.0" x2="710.5" y2="285.0" stroke="#111827" stroke-width="2.5"/><line x1="710.5" y1="285.0" x2="704.5" y2="298.0" stroke="#111827" stroke-width="2.5"/><line x1="710.5" y1="285.0" x2="716.5" y2="298.0" stroke="#111827" stroke-width="2.5"/><line x1="710.5" y1="275.0" x2="718.5" y2="281.0" stroke="#111827" stroke-width="2.5"/>
<text x="700.0" y="128.0" font-size="16" fill="#6b7280" font-weight="700" text-anchor="start">walking on FLAT ground</text>
<text x="700.0" y="150.0" font-size="13" fill="#57606a" font-weight="normal" text-anchor="start">for every 1 forward, you gain 0</text>
<text x="700.0" y="428.0" font-size="15" fill="#24292f" font-weight="700" text-anchor="start" font-family="ui-monospace, Menlo, monospace">slope = 0/1 = 0</text>
<text x="60.0" y="466.0" font-size="14" fill="#57606a" font-weight="normal" text-anchor="start">Positive slope = climbing, negative = descending, zero = level. A derivative just measures this slope at one spot on a curve.</text>
</svg>