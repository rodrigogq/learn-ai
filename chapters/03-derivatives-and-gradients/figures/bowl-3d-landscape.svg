<text x="40.0" y="42.0" font-size="19" fill="#24292f" font-weight="700" text-anchor="start" font-style="normal">A function of two inputs is a 3D landscape &#8212; the goal is the valley floor</text>
<text x="40.0" y="66.0" font-size="14" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">f(x, y) = x&#178; + 3y&#178;.  The two inputs (x, y) are a spot on the ground; the output f is the height of the land there.</text>
