<text x="417.4" y="114.0" font-size="12" fill="#b91c1c" font-weight="700" text-anchor="middle">mean = 73.75</text>
<text x="410.0" y="244.0" font-size="15" fill="#111827" font-weight="700" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">z = (size − 73.75) / 26.94</text>
<text x="410.0" y="266.0" font-size="12.5" fill="#6b7280" font-weight="normal" text-anchor="middle">subtract the mean (73.75), then divide by the standard deviation (26.94)</text>
<text x="40.0" y="320.0" font-size="14" fill="#14532d" font-weight="700" text-anchor="start">STANDARDIZED z</text>
