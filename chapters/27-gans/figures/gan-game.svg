<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="500" rx="12" fill="#f6f8fa"/>
  <text x="60" y="46" font-size="20" font-weight="700" fill="#24292f">A GAN is a game: a forger and a detective, each making the other better</text>

  <defs>
    <marker id="ganArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#57606a"/>
    </marker>
  </defs>

  <!-- noise -->
  <rect x="60" y="150" width="110" height="60" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="78" y="176" font-size="14" font-weight="700" fill="#3730a3">random</text>
  <text x="84" y="196" font-size="14" font-weight="700" fill="#3730a3">noise</text>
  <line x1="170" y1="180" x2="205" y2="180" stroke="#57606a" stroke-width="2.5" marker-end="url(#ganArrow)"/>

  <!-- generator -->
  <rect x="210" y="140" width="150" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="230" y="172" font-size="15" font-weight="700" fill="#14532d">GENERATOR</text>
  <text x="230" y="196" font-size="13" fill="#166534">"the forger"</text>
  <line x1="360" y1="180" x2="400" y2="180" stroke="#57606a" stroke-width="2.5" marker-end="url(#ganArrow)"/>
  <text x="366" y="168" font-size="12" fill="#57606a">fake</text>

  <!-- fake image + real image feeding discriminator -->
  <rect x="405" y="150" width="60" height="60" rx="6" fill="#374151" stroke="#111827"/>
  <text x="418" y="185" font-size="20" fill="#9ca3af">?</text>

  <rect x="405" y="270" width="60" height="60" rx="6" fill="#374151" stroke="#111827"/>
  <text x="424" y="305" font-size="24" fill="#e5e7eb">3</text>
  <text x="390" y="356" font-size="12" fill="#57606a">real digit (dataset)</text>
  <line x1="465" y1="300" x2="510" y2="240" stroke="#57606a" stroke-width="2" marker-end="url(#ganArrow)"/>
  <line x1="465" y1="180" x2="510" y2="205" stroke="#57606a" stroke-width="2" marker-end="url(#ganArrow)"/>

  <!-- discriminator -->
  <rect x="520" y="180" width="160" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="540" y="212" font-size="15" font-weight="700" fill="#7f1d1d">DISCRIMINATOR</text>
  <text x="540" y="236" font-size="13" fill="#991b1b">"the detective"</text>
  <line x1="680" y1="220" x2="720" y2="220" stroke="#57606a" stroke-width="2.5" marker-end="url(#ganArrow)"/>
  <text x="726" y="215" font-size="14" fill="#24292f">real or fake?</text>
  <text x="726" y="235" font-size="13" fill="#57606a">a probability</text>

  <!-- two opposing training signals -->
  <path d="M 600 260 C 600 380, 300 400, 285 224" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#ganArrow)"/>
  <text x="330" y="410" font-size="13" font-weight="700" fill="#14532d">generator learns: "make the detective say REAL"</text>
  <path d="M 600 262 C 600 340, 560 340, 560 264" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8 5" marker-end="url(#ganArrow)"/>
  <text x="500" y="330" font-size="13" font-weight="700" fill="#7f1d1d">detective learns: "catch the fakes"</text>

  <!-- caption -->
  <text x="60" y="452" font-size="15" fill="#24292f">Opposite goals, trained in lockstep: as the detective sharpens, the forger must improve to keep fooling it,</text>
  <text x="60" y="474" font-size="15" fill="#24292f">and vice versa. At equilibrium the fakes are indistinguishable from real data &#8212; and the forger is your image factory.</text>
</svg>
