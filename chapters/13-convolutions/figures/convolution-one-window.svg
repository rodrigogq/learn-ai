<text x="300.0" y="258.0" font-size="12.5" fill="#57606a" font-weight="normal" text-anchor="start">Multiply each cell by the kernel cell in the SAME position (top-left&#215;top-left, &#8230;), giving 9 products.</text>
<text x="300.0" y="276.0" font-size="12.5" fill="#57606a" font-weight="normal" text-anchor="start">Add them all: 0+0+1 + 0+0+1 + 0+0+1 = </text>
<text x="608.0" y="276.0" font-size="15" fill="#14532d" font-weight="700" text-anchor="start">+3</text>
<text x="636.0" y="276.0" font-size="12.5" fill="#57606a" font-weight="normal" text-anchor="start">  &#8592; one single number</text>
<text x="60.0" y="346.0" font-size="13" fill="#14532d" font-weight="700" text-anchor="start">the output map (3&#215;3)</text>
