<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="540" rx="12" fill="#f6f8fa"/>
  <text x="60" y="46" font-size="20" font-weight="700" fill="#24292f">Autoencoder vs VAE: the same squeeze, but only one can generate</text>

  <defs>
    <marker id="aeArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#57606a"/>
    </marker>
  </defs>

  <!-- Top: the shared architecture (hourglass) -->
  <text x="60" y="96" font-size="15" font-weight="700" fill="#24292f">the shared shape: an hourglass with a tiny waist</text>
  <polygon points="120,120 200,150 200,210 120,240" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="128" y="188" font-size="13" fill="#1e3a8a">encoder</text>
  <text x="130" y="258" font-size="12" fill="#57606a">784 pixels</text>

  <rect x="230" y="165" width="60" height="30" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="238" y="185" font-size="12" fill="#78350f">2 nums</text>
  <text x="228" y="220" font-size="12" fill="#57606a">the bottleneck</text>

  <polygon points="320,150 400,120 400,240 320,210" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="188" font-size="13" fill="#14532d">decoder</text>
  <text x="330" y="258" font-size="12" fill="#57606a">784 pixels</text>

  <line x1="200" y1="180" x2="228" y2="180" stroke="#57606a" stroke-width="2" marker-end="url(#aeArrow)"/>
  <line x1="292" y1="180" x2="318" y2="180" stroke="#57606a" stroke-width="2" marker-end="url(#aeArrow)"/>
  <text x="440" y="175" font-size="14" fill="#24292f">trained to make output = input,</text>
  <text x="440" y="195" font-size="14" fill="#24292f">so the 2-number waist must capture</text>
  <text x="440" y="215" font-size="14" fill="#24292f">the digit's essence (784 &#8594; 2 &#8594; 784).</text>

  <!-- Bottom left: plain AE latent space (scattered) -->
  <text x="60" y="316" font-size="15" font-weight="700" fill="#7f1d1d">plain autoencoder: codes scatter, gaps are garbage</text>
  <rect x="80" y="330" width="180" height="180" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <g fill="#dc2626">
    <circle cx="110" cy="360" r="4"/><circle cx="120" cy="370" r="4"/><circle cx="230" cy="350" r="4"/>
    <circle cx="220" cy="480" r="4"/><circle cx="100" cy="470" r="4"/><circle cx="160" cy="360" r="4"/>
    <circle cx="240" cy="430" r="4"/><circle cx="95" cy="420" r="4"/>
  </g>
  <text x="150" y="425" font-size="24" fill="#9ca3af">?</text>
  <text x="140" y="500" font-size="11" fill="#57606a">sample the "?" gap &#8594; noise</text>

  <!-- Bottom right: VAE latent space (filled, smooth) -->
  <text x="500" y="316" font-size="15" font-weight="700" fill="#14532d">VAE: the KL term packs codes into a smooth, full disc</text>
  <rect x="520" y="330" width="180" height="180" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <circle cx="610" cy="420" r="82" fill="#dcfce7" opacity="0.5"/>
  <g fill="#16a34a">
    <circle cx="590" cy="400" r="4"/><circle cx="630" cy="410" r="4"/><circle cx="605" cy="440" r="4"/>
    <circle cx="640" cy="440" r="4"/><circle cx="580" cy="435" r="4"/><circle cx="615" cy="385" r="4"/>
    <circle cx="655" cy="415" r="4"/><circle cx="575" cy="410" r="4"/><circle cx="620" cy="460" r="4"/>
  </g>
  <text x="565" y="500" font-size="11" fill="#57606a">sample ANYWHERE inside &#8594; a real digit</text>

  <!-- Bottom-most caption -->
  <text x="740" y="380" font-size="14" fill="#24292f" font-weight="700">the one difference:</text>
  <text x="740" y="404" font-size="13" fill="#24292f">the VAE encodes a</text>
  <text x="740" y="422" font-size="13" fill="#24292f">DISTRIBUTION, and a</text>
  <text x="740" y="440" font-size="13" fill="#24292f">KL penalty pulls them</text>
  <text x="740" y="458" font-size="13" fill="#24292f">all toward one shared</text>
  <text x="740" y="476" font-size="13" fill="#24292f">normal &#8212; no gaps left.</text>
</svg>
