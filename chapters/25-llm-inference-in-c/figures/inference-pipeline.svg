<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="480" rx="12" fill="#f6f8fa"/>
  <text x="60" y="46" font-size="20" font-weight="700" fill="#24292f">A trained transformer is a file of numbers and a few hundred lines of loops</text>

  <defs>
    <marker id="iArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#57606a"/>
    </marker>
  </defs>

  <!-- PyTorch side -->
  <rect x="60" y="90" width="360" height="150" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="80" y="120" font-size="16" font-weight="700" fill="#7f1d1d">Chapter 24: PyTorch + GPU</text>
  <text x="80" y="148" font-size="14" fill="#7f1d1d">trained model (checkpoint .pt)</text>
  <text x="80" y="172" font-size="13" fill="#991b1b">autograd, optimizer state, CUDA/MPS kernels,</text>
  <text x="80" y="192" font-size="13" fill="#991b1b">gigabytes of framework - all needed to TRAIN,</text>
  <text x="80" y="212" font-size="13" fill="#991b1b">none needed to RUN.</text>

  <!-- Export arrow -->
  <line x1="420" y1="165" x2="500" y2="165" stroke="#57606a" stroke-width="2.5" marker-end="url(#iArrow)"/>
  <text x="424" y="150" font-size="13" font-weight="700" fill="#57606a">export</text>
  <text x="424" y="200" font-size="12" fill="#57606a">weights &#8594;</text>
  <text x="424" y="216" font-size="12" fill="#57606a">flat .bin</text>

  <!-- C side -->
  <rect x="520" y="90" width="360" height="150" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="540" y="120" font-size="16" font-weight="700" fill="#14532d">Chapter 25: one pure-C file</text>
  <text x="540" y="148" font-size="14" fill="#14532d">./llm_inference model.bin "prompt"</text>
  <text x="540" y="172" font-size="13" fill="#166534">no PyTorch. no libraries but libm.</text>
  <text x="540" y="192" font-size="13" fill="#166534">~400 lines: the forward pass, the BPE</text>
  <text x="540" y="212" font-size="13" fill="#166534">tokenizer, and sampling - all yours.</text>

  <!-- What the C file contains -->
  <text x="60" y="290" font-size="15" font-weight="700" fill="#24292f">every part of the C forward pass is a chapter you finished:</text>
  <g font-size="13.5" fill="#24292f">
    <text x="80" y="320">&#8226; matvec (dequantizing int8 on the fly) &#8212; Chapter 2, doing ~99% of the work</text>
    <text x="80" y="344">&#8226; multi-head causal attention &#8212; Chapter 22</text>
    <text x="80" y="368">&#8226; layer norm, GELU, residual adds &#8212; Chapters 11, 14, 23</text>
    <text x="80" y="392">&#8226; BPE encode/decode &#8212; Chapter 20   &#8226; temperature + top-k sampling &#8212; Chapter 23</text>
  </g>

  <text x="60" y="440" font-size="15" fill="#24292f">int8 quantization (&#8722;75% size) turns each float32 weight into one byte + a shared scale, dequantized as it is used.</text>
  <text x="60" y="464" font-size="14" fill="#57606a">This is exactly how llama.cpp runs multi-billion-parameter models on laptops. Same idea, more optimization.</text>
</svg>
