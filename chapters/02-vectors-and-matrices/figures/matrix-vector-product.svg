<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="430" rx="12" fill="#f6f8fa"/>
  <text x="60" y="52" font-size="20" font-weight="700" fill="#24292f">Matrix times vector: every row takes a dot product with the vector</text>

  <!-- Matrix W (3x2) -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="24">
    <text x="95" y="120" font-size="18" fill="#57606a" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">W  (3 rows, 2 columns)</text>
    <!-- brackets -->
    <path d="M 90 150 h -14 v 190 h 14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <path d="M 240 150 h 14 v 190 h -14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <!-- row highlight -->
    <rect x="84" y="158" width="164" height="46" rx="8" fill="#fde68a" opacity="0.85"/>
    <text x="110" y="192" fill="#24292f">2   0</text>
    <text x="110" y="255" fill="#24292f">1   3</text>
    <text x="110" y="318" fill="#24292f">0   1</text>
  </g>

  <!-- Vector x -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="24">
    <text x="320" y="120" font-size="18" fill="#57606a" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">x</text>
    <path d="M 320 180 h -14 v 130 h 14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <path d="M 400 180 h 14 v 130 h -14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <rect x="314" y="188" width="94" height="110" rx="8" fill="#bfdbfe" opacity="0.6"/>
    <text x="345" y="228" fill="#24292f">4</text>
    <text x="345" y="288" fill="#24292f">2</text>
  </g>

  <text x="450" y="255" font-size="30" fill="#24292f">=</text>

  <!-- Result vector -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="24">
    <text x="510" y="120" font-size="18" fill="#57606a" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">W x  (3 numbers)</text>
    <path d="M 510 150 h -14 v 190 h 14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <path d="M 600 150 h 14 v 190 h -14" fill="none" stroke="#24292f" stroke-width="2.5"/>
    <rect x="504" y="158" width="104" height="46" rx="8" fill="#fde68a" opacity="0.85"/>
    <text x="535" y="192" fill="#24292f">8</text>
    <text x="527" y="255" fill="#24292f">10</text>
    <text x="535" y="318" fill="#24292f">2</text>
  </g>

  <!-- Explanation of highlighted row -->
  <g font-size="16" fill="#78350f">
    <text x="660" y="176" font-weight="700">highlighted row:</text>
    <text x="660" y="200" font-family="ui-monospace, 'SF Mono', Menlo, monospace">(2,0)&#183;(4,2)</text>
    <text x="660" y="224" font-family="ui-monospace, 'SF Mono', Menlo, monospace">= 2*4 + 0*2 = 8</text>
  </g>
  <g font-size="15" fill="#57606a">
    <text x="660" y="272">row 2: 1*4 + 3*2 = 10</text>
    <text x="660" y="296">row 3: 0*4 + 1*2 = 2</text>
  </g>

  <text x="60" y="392" font-size="16" fill="#24292f">Shape rule: (3&#215;2 matrix) times (vector of 2) &#8594; vector of 3. Inner sizes must match, they &#8220;cancel out&#8221;.</text>
</svg>
